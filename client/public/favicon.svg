<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>

  <!-- Shopping bag icon -->
  <g transform="translate(50, 50)">
    <!-- Bag body -->
    <path d="M -18 -5 L -20 20 Q -20 25 -15 25 L 15 25 Q 20 25 20 20 L 18 -5 Z"
          fill="#ffffff" stroke="#ffffff" stroke-width="2"/>

    <!-- Bag handles -->
    <path d="M -12 -5 Q -12 -15 0 -15 Q 12 -15 12 -5"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

    <!-- RT monogram -->
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif"
          font-size="14" font-weight="bold" fill="#1e40af">RT</text>
  </g>
</svg>
