name: 'Trigger Portable Routine'
description: 'Triggers a Portable routine via webhook with JWT authentication'
inputs:
  routine_name:
    description: 'Name of the routine'
    required: true
  prompt:
    description: 'Prompt to send to Claude'
    required: true
  model:
    description: 'Claude model to use'
    required: false
    default: 'sonnet'
  permissions:
    description: 'Permission mode'
    required: false
    default: 'bypass_permissions'
  webhook_secret:
    description: 'JWT token for webhook authentication (Bearer token)'
    required: true
  webhook_url:
    description: 'Webhook URL for this repository'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Trigger Routine
      shell: bash
      env:
        ROUTINE_NAME: ${{ inputs.routine_name }}
        PROMPT: ${{ inputs.prompt }}
        MODEL: ${{ inputs.model }}
        PERMISSIONS: ${{ inputs.permissions }}
        WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        EVENT_NAME: ${{ github.event_name }}
        RUN_ID: ${{ github.run_id }}
        RUN_NUMBER: ${{ github.run_number }}
        ACTOR: ${{ github.actor }}
        REF: ${{ github.ref }}
        SHA: ${{ github.sha }}
        WORKFLOW: ${{ github.workflow }}
      run: |
        # Build JSON payload safely with jq (handles newlines, quotes,
        # backticks, etc. in ROUTINE_NAME/PROMPT without corrupting the JSON)
        PAYLOAD=$(jq -n \
          --arg routine_id "$WORKFLOW" \
          --arg routine_name "$ROUTINE_NAME" \
          --arg prompt "$PROMPT" \
          --arg model "$MODEL" \
          --arg permissions "$PERMISSIONS" \
          --arg event "$EVENT_NAME" \
          --arg run_id "$RUN_ID" \
          --arg run_number "$RUN_NUMBER" \
          --arg actor "$ACTOR" \
          --arg ref "$REF" \
          --arg sha "$SHA" \
          '{
            routine_id: $routine_id,
            routine_name: $routine_name,
            prompt: $prompt,
            model: $model,
            permissions: $permissions,
            trigger_context: {
              event: $event,
              workflow_run_id: $run_id,
              workflow_run_number: $run_number,
              actor: $actor,
              ref: $ref,
              sha: $sha
            }
          }')

        # Send webhook with JWT Bearer token authentication
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $WEBHOOK_SECRET" \
          -d "$PAYLOAD")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ Webhook failed with status $HTTP_CODE"
          echo "$BODY"
          exit 1
        fi

        echo "✅
